version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: pbl7
      POSTGRES_PASSWORD: pbl7_secret
      POSTGRES_DB: pbl7_fl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://pbl7:pbl7_secret@postgres:5432/pbl7_fl
      DATABASE_URL_SYNC: postgresql://pbl7:pbl7_secret@postgres:5432/pbl7_fl
    depends_on:
      - postgres
    volumes:
      - ../..:/app
    command: uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    command: npm run dev

volumes:
  pgdata:
